name: Build OpenJDK 25 for Android

on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '0 0 1 */2 *'

jobs:
  build_android:
    strategy:
      matrix:
        arch: [ "aarch64" ]
      fail-fast: false

    name: "Build for Android ${{matrix.arch}}"
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    - name: set up JDK 25
      uses: actions/setup-java@v4
      with:
        java-version: '25-ea' # Đây là bản mày cần để fix lỗi version 69.0
        distribution: 'zulu'
    - name: Install build dependencies
      run: |
        sudo apt update
        sudo apt -y install autoconf python3 python-is-python3 unzip zip systemtap-sdt-dev gcc-multilib g++-multilib libxtst-dev libasound2-dev libelf-dev libfontconfig1-dev libx11-dev
    - name: Build with CI build script
      run: bash "ci_build_arch_${{matrix.arch}}.sh"
    - name: Upload JDK build output
      uses: actions/upload-artifact@v4
      with:
        name: "jdk25-${{matrix.arch}}"
        path: jdk25-android*.tar.xz

    - name: Setup tmate session if failed
      if: ${{ failure() }}
      uses: mxschmitt/action-tmate@v3

    - name: Upload JRE build output
      uses: actions/upload-artifact@v4
      with:
        name: 'jre25-${{matrix.arch}}'
        path: jre25-android*.tar.xz
